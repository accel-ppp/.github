name: Check for unused imports using Pylint 
on:
  workflow_call:
    inputs:
      check_file_path:
        description: 'Path to check for unused py imports'
        required: false
        default: 'src/migration-scripts/'
        type: string
jobs:
  check-unused-imports:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:

      - name: Checkout pull request merge ref
        uses: actions/checkout@v3
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/merge
          repository: ${{ github.event.pull_request.base.repo.full_name }}

      - name: Get changed files
        id: changed-files
        uses: actions/github-script@v4
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const { data: files } = await github.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });
            const checkFilePath = '${{ inputs.check_file_path }}';
            const changedFiles = files.map(file => file.filename).filter(file => file.startsWith(checkFilePath));
            console.log("Changed files:", changedFiles);
            return { result: changedFiles.join(',') };

      - name: Get changed py files
        run: |
          echo "Changed files: ${{ steps.changed-files.outputs.result }}"
          py_files=$(echo ${{ steps.changed-files.outputs.result }} | sed 's/{result://; s/}//' | tr ',' ' ')
          echo "CHANGED_PY_FILES=$py_files" >> $GITHUB_ENV

      - name: Set up Python
        if: ${{ env.CHANGED_PY_FILES != '' }}
        uses: actions/setup-python@v3
        with:
          python-version: 3.11

      - name: Install dependencies
        if: ${{ env.CHANGED_PY_FILES != '' }}
        run: |
          python -m pip install --upgrade pip
          pip install pylint

      - name: Check unused imports (pylint)
        if: ${{ env.CHANGED_PY_FILES != '' }}
        run: |
          set +e
          output=$(pylint --disable=all --enable=W0611 $CHANGED_PY_FILES)
          exit_code=$?
          set -e
          echo "$output"
          run_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          message=":white_check_mark: No issues found in *unused-imports* check."
          if [[ $exit_code -ne 0 ]]; then
            message=":x: Issues found in *unused-imports* check. "
          fi
          echo "WORKFLOW_MESSAGE=${message}. Please refer the [workflow run]($run_url)" >> $GITHUB_ENV
          exit $exit_code

      - name: Add PR comment
        if: ${{ always() && env.WORKFLOW_MESSAGE != '' }}
        uses: mshick/add-pr-comment@v2
        with:
          message: |-
            ${{ env.WORKFLOW_MESSAGE }}
          message-id: "UNUSED_IMPORTS_VALIDATION"
          allow-repeats: false